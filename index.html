    <style>
        /* Base Reset & Styling */
        body {
            margin: 0;
            padding: 0;
            background-color: #07070a; /* Deep void background */
            color: #eaeaea;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Enhanced Center Glow Effect */
        .background-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vw;
            /* Increased contrast and opacity for the Toroidal field */
            background: radial-gradient(circle at center, rgba(50, 65, 100, 0.6) 0%, rgba(20, 25, 40, 0.4) 40%, rgba(7, 7, 10, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* Header Architecture */
        header {
            text-align: center;
            margin-top: 12vh;
            margin-bottom: 8vh;
            z-index: 1;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-weight: 400;
            letter-spacing: 0.25em;
            font-size: 2.8rem;
            text-transform: uppercase;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        /* The Grid System for the Books */
        .book-container {
            display: flex;
            flex-direction: column; /* Mobile first: stacked */
            gap: 5rem;
            width: 90%;
            max-width: 1000px;
            justify-content: center;
            align-items: center;
            z-index: 1;
            padding-bottom: 10vh;
        }

        /* Desktop override: side-by-side */
        @media (min-width: 768px) {
            .book-container {
                flex-direction: row; 
                gap: 6rem;
                align-items: flex-start;
            }
        }

        /* Book Link Container */
        .book-link {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .book-link:hover {
            transform: translateY(-12px); /* Lifts the book on hover */
        }

        /* The Book Cover Div - Upgraded with Permanent Glow */
        .book-cover {
            width: 260px;
            height: 390px;
            background: #111;
            border-radius: 4px;
            /* Permanent ambient blue/white glow + underlying dark drop shadow */
            box-shadow: 0 0 25px rgba(130, 160, 220, 0.25), 0 15px 35px rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #333; /* Slightly lighter baseline border */
            transition: box-shadow 0.4s ease, border-color 0.4s ease;
        }

        /* The Violet Override on Hover */
        .book-link:hover .book-cover {
            /* Shifts to a vibrant purple/violet glow */
            box-shadow: 0 0 45px rgba(150, 80, 255, 0.5), 0 20px 50px rgba(0,0,0,0.9); 
            border-color: #8c5cfb; /* Purple border activation */
        }

        /* Image sizing within the cover div */
        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            color: #555; 
            text-align: center;
            font-size: 0.9rem;
        }

        /* Typography for Book Titles */
        .book-title {
            margin-top: 1.5rem;
            font-size: 1.1rem;
            letter-spacing: 0.08em;
            text-align: center;
            max-width: 260px;
            opacity: 0.8;
            transition: opacity 0.3s ease, color 0.3s ease;
        }

        /* Brighten the title text slightly on hover to match the glow */
        .book-link:hover .book-title {
            opacity: 1;
            color: #e0d0ff; /* Subtle purple tint to text on hover */
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <header>

    <div class="book-container">

            <div class="book-cover">
                <img src="SOSCover.jpg" alt="Cover of The Sovereign Operating System">
            </div>
            <div class="book-title">The Sovereign Operating System</div>
        </a>

            <div class="book-cover">

            </div>
            <div class="book-title">The Ghost's Logs</div>
        </a>

    </div>
